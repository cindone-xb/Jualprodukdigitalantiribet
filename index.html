<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Store</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  scroll-behavior: smooth;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 1100px;
  margin: auto;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
  font-weight: bold;
  border: none;
}

.btn-primary {
  background: #22c55e;
  color: white;
  box-shadow: 0 0 15px #22c55e88;
}

.btn-primary:hover {
  transform: scale(1.05);
}

/* CARD */
.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #1e293b;
  border-radius: 15px;
  width: 280px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
}

.card-content {
  padding: 15px;
  text-align: center;
}

/* LOGIN */
.login-box {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.login-box input {
  display: block;
  margin: 5px 0;
  padding: 8px;
  width: 150px;
}

/* POPUP DISKON */
.popup {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #22c55e;
  color: black;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

/* NOTIF */
.notif {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e293b;
  padding: 10px 15px;
  border-radius: 10px;
  display: none;
}

/* ANIMASI SCROLL */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box">
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button class="btn btn-primary">Login</button>
</div>

<!-- HERO -->
<div class="hero container fade">
  <h1>💸 Jual Produk Digital Tanpa Ribet</h1>
  <p>Mulai jualan sekarang & hasilkan uang online</p>
  <button class="btn btn-primary">Mulai</button>
</div>

<!-- PRODUK -->
<div class="container fade">
  <h2>Produk Unggulan</h2>
  <div class="products">

    <div class="card">
      <img src="https://picsum.photos/400/200?1">
      <div class="card-content">
        <h3>Template Website</h3>
        <p>Rp 20.000</p>
        <a href="https://lynk.id" target="_blank">
          <button class="btn btn-primary">Beli</button>
        </a>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/200?2">
      <div class="card-content">
        <h3>Panduan Jualan</h3>
        <p>Rp 15.000</p>
        <a href="https://lynk.id" target="_blank">
          <button class="btn btn-primary">Beli</button>
        </a>
      </div>
    </div>

  </div>
</div>

<!-- CTA -->
<div class="hero fade">
  <h2>🚀 Mulai Sekarang!</h2>
  <a href="https://lynk.id" target="_blank">
    <button class="btn btn-primary">Beli Sekarang</button>
  </a>
</div>

<!-- POPUP DISKON -->
<div class="popup" id="popup">
  🎉 Diskon 50% hari ini!
</div>

<!-- NOTIF -->
<div class="notif" id="notif">
  Seseorang baru saja membeli!
</div>

<script>

// SCROLL ANIMATION
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 50) {
      el.classList.add('show');
    }
  });
});

// POPUP DISKON
setTimeout(() => {
  document.getElementById('popup').style.display = 'block';
}, 3000);

// NOTIF RANDOM
setInterval(() => {
  const notif = document.getElementById('notif');
  notif.style.display = 'block';
  setTimeout(() => notif.style.display = 'none', 3000);
}, 8000);

</script>

</body>
</html>
